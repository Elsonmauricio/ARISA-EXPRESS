  document.addEventListener('fullscreenchange', function(e){

  }, false);
  
  document.addEventListener('click', function (event) {
    if (!event.target.hasAttribute('data-toggle-fullscreen')) return;
    if (/motanf/.test(document.body.className)){

      }

      } else {
